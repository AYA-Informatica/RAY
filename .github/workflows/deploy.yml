name: Deploy RAY Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Web App Deployment ───────────────────────
  deploy-web:
    name: Deploy Web App
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ray-web/package-lock.json
      
      - name: Install dependencies
        working-directory: ray-web
        run: npm ci
      
      - name: Build
        working-directory: ray-web
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_APP_URL: https://ray.rw
          VITE_APP_ENV: production
      
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}

  # ─── Admin Dashboard Deployment ───────────────
  deploy-admin:
    name: Deploy Admin Dashboard
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ray-admin/package-lock.json
      
      - name: Install dependencies
        working-directory: ray-admin
        run: npm ci
      
      - name: Build
        working-directory: ray-admin
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_APP_URL: https://admin.ray.rw
          VITE_APP_ENV: production
      
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          target: admin

  # ─── Cloud Functions Deployment ───────────────
  deploy-functions:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ray-functions/package-lock.json
      
      - name: Install dependencies
        working-directory: ray-functions
        run: npm ci
      
      - name: Build
        working-directory: ray-functions
        run: npm run build
      
      - name: Deploy to Firebase Functions
        working-directory: ray-functions
        run: |
          npm install -g firebase-tools
          firebase deploy --only functions --token ${{ secrets.FIREBASE_TOKEN }} --project ${{ secrets.FIREBASE_PROJECT_ID }}

  # ─── Linting & Type Checking ──────────────────
  lint-web:
    name: Lint Web App
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ray-web/package-lock.json
      
      - name: Install dependencies
        working-directory: ray-web
        run: npm ci
      
      - name: Type check
        working-directory: ray-web
        run: npx tsc --noEmit
      
      - name: Lint
        working-directory: ray-web
        run: npm run lint

  lint-functions:
    name: Lint Cloud Functions
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ray-functions/package-lock.json
      
      - name: Install dependencies
        working-directory: ray-functions
        run: npm ci
      
      - name: Type check
        working-directory: ray-functions
        run: npx tsc --noEmit
      
      - name: Lint
        working-directory: ray-functions
        run: npm run lint
